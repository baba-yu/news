<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Future Prediction Theme Intelligence</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- Graph canvas -->
  <canvas id="graph-canvas"></canvas>
  <!-- HTML label overlay (positioned absolutely) -->
  <div id="label-layer" aria-hidden="true"></div>

  <!-- Top-right square menu (fixed, always visible) -->
  <nav id="top-menu" aria-label="Dashboard controls">
    <div class="menu-group" role="tablist" aria-label="Scope">
      <button class="menu-btn tab" data-scope="mix" role="tab" aria-selected="true">MIX</button>
      <button class="menu-btn tab" data-scope="tech" role="tab" aria-selected="false">TECH</button>
      <button class="menu-btn tab" data-scope="business" role="tab" aria-selected="false">BIZ</button>
    </div>
    <div class="menu-group" role="radiogroup" aria-label="Window">
      <button class="menu-btn win" data-window="7d" role="radio" aria-checked="false">7D</button>
      <button class="menu-btn win" data-window="30d" role="radio" aria-checked="true">30D</button>
      <button class="menu-btn win" data-window="90d" role="radio" aria-checked="false">90D</button>
    </div>
    <div class="menu-group" role="radiogroup" aria-label="Heatmap metric">
      <button class="menu-btn heat" data-heat="attention"   role="radio" aria-checked="true"  title="Heatmap based on attention (frequency x relevance)">ATT</button>
      <button class="menu-btn heat" data-heat="realization" role="radio" aria-checked="false" title="Heatmap based on realization score">REAL</button>
      <button class="menu-btn heat" data-heat="grass"       role="radio" aria-checked="false" title="Heatmap based on today's daily level (0-4)">DAILY</button>
    </div>
    <div class="menu-group tool-group" role="radiogroup" aria-label="Empty-space drag tool">
      <button class="menu-btn tool" data-tool="pan"    role="radio" aria-checked="false" title="Pan (translate the view)">
        <span class="tool-ic" aria-hidden="true">&#x21F1;</span><span class="tool-lbl">PAN</span>
      </button>
      <button class="menu-btn tool" data-tool="rotate" role="radio" aria-checked="true"  title="Rotate (tilt the graph plane)">
        <span class="tool-ic" aria-hidden="true">&#x270B;</span><span class="tool-lbl">ROT</span>
      </button>
    </div>
  </nav>

  <!-- Category filter menu (sits under #top-menu, populated by JS per scope) -->
  <nav id="category-menu" aria-label="Category filters">
    <div class="menu-head">
      <span class="menu-head-title">Categories</span>
      <button class="menu-mini-btn" id="cat-all" title="Show all">ALL</button>
      <button class="menu-mini-btn" id="cat-none" title="Hide all">NONE</button>
    </div>
    <div class="category-filters" id="category-filters" role="group">
      <!-- buttons injected by JS -->
    </div>
  </nav>

  <!-- Header (top-left, metadata) -->
  <header id="meta-header">
    <div class="title">Future Prediction Theme Intelligence</div>
    <div class="meta-sub" id="meta-sub">loading…</div>
  </header>

  <!-- Hint strip (bottom-left) -->
  <aside id="hint-strip">
    <span>drag node: move</span>
    <span id="hint-tool">empty drag: rotate</span>
    <span>shift/space: temp-pan</span>
    <span>wheel: zoom</span>
    <span>click node: details</span>
  </aside>

  <!-- Right slide-in detail panel -->
  <section id="detail-panel" aria-hidden="true">
    <div class="panel-head">
      <div>
        <div id="panel-type" class="panel-type">—</div>
        <h2 id="panel-title">Select a node</h2>
        <div id="panel-subtitle" class="panel-subtitle"></div>
      </div>
      <div class="panel-head-btns">
        <button id="panel-back" class="panel-head-btn" aria-label="Back to previous node" title="Back" disabled>←</button>
        <button id="panel-close" class="panel-head-btn" aria-label="Close panel" title="Close">×</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body">
      <p class="muted">Click a node in the graph to see details here.</p>
    </div>
  </section>

  <!-- Loading / error overlay -->
  <div id="app-status" class="status-pill" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
