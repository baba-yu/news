<svg viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="wide"></feGaussianBlur>
      <feGaussianBlur stdDeviation="1" in="SourceGraphic" result="tight"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="wide"></feMergeNode>
        <feMergeNode in="tight"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <filter id="orangeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="8" result="wide"></feGaussianBlur>
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="tight"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="wide"></feMergeNode>
        <feMergeNode in="tight"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="340" height="340" rx="50" fill="#0a0f1c"></rect>

  <g filter="url(#blueGlow)">
    <circle cx="170" cy="170" r="141.421" stroke="#7cc8ff" stroke-width="5" fill="none"></circle>
    <g stroke="#7cc8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="85.15" y1="56.86" x2="85.15" y2="283.14"></line>
      <line x1="85.15" y1="56.86" x2="170" y2="283.14"></line>
      <line x1="170" y1="56.86" x2="254.85" y2="56.86"></line>
      <line x1="170" y1="56.86" x2="170" y2="170"></line>
      <line x1="170" y1="170" x2="254.85" y2="170"></line>
      <line x1="254.85" y1="170" x2="254.85" y2="283.14"></line>
      <line x1="254.85" y1="283.14" x2="170" y2="283.14"></line>
    </g>
  </g>

  <g fill="#e09538" filter="url(#orangeGlow)">
    <circle cx="254.85" cy="56.86" r="7"></circle>
    <circle cx="170" cy="170" r="7"></circle>
    <circle cx="85.15" cy="283.14" r="7"></circle>
  </g>
</svg>