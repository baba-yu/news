    one_liner_eli14_es: "Convertir palabras, frases o imágenes en largas listas de números para poder preguntar '¿cuáles son los más parecidos?' — matemáticas en vez de coincidencia por palabra clave. El combustible de la búsqueda vectorial y de RAG."
    one_liner_eli14_fil: "Pagsasalin ng salita, pangungusap, o imahe sa mahabang listahan ng numero para makapagtanong ng 'alin ang pinakamagkakatulad?' — matematika sa halip na keyword matching. Ang gasolina ng vector search at RAG."
