  - term: "prompt caching"
    aliases: ["KV cache reuse", "prefix caching"]
    one_liner_eli14: "When an LLM stores the work it did on a long shared instructions block, so the next call reuses it instead of re-computing — way cheaper and faster."
    one_liner_eli14_ja: "LLM が長い共有指示ブロックの計算結果を保存し、次の呼び出しで再計算せず再利用する仕組み — 大幅に安く・速くなる。"
    one_liner_eli14_es: "Cuando un LLM guarda el trabajo hecho sobre un bloque largo de instrucciones compartidas, para que la siguiente llamada lo reutilice en lugar de recalcularlo — mucho más barato y rápido."
    one_liner_eli14_fil: "Pag ini-store ng LLM ang ginawang computation sa mahabang shared instructions block, para gamitin muli ng susunod na call sa halip na i-compute ulit — mas mura at mabilis."
    why_it_matters: "Prompt caching turns 'long context' from a cost problem into a cost advantage. Anthropic, Google, and OpenAI all expose it; per-token-margin disclosures will hinge on it."
    why_it_matters_ja: "プロンプトキャッシュは「長文コンテクスト」をコスト負担からコスト優位に変える。Anthropic、Google、OpenAI のいずれも提供しており、トークン単価マージンの開示はこれに左右される。"
    why_it_matters_es: "El prompt caching convierte el 'contexto largo' de problema de coste en ventaja de coste. Anthropic, Google y OpenAI lo exponen; la divulgación de margen por token dependerá de esto."
